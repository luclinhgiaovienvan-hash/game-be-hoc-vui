<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Premium Nghiêng Đầu Full</title><style>body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffdff0,#dff9ff,#fff6cc);display:grid;place-items:center;padding:12px}.app{max-width:900px;width:100%;background:#fff;border-radius:30px;padding:18px;box-shadow:0 15px 35px rgba(0,0,0,.12)}video{width:100%;max-height:320px;object-fit:cover;border-radius:18px;background:#000}.q{text-align:center;font-size:30px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ans{padding:22px;border-radius:22px;background:#fff;text-align:center;font-size:58px;font-weight:700}.left.on{background:#cde7ff}.right.on{background:#ffd2ea}.btn{padding:12px 16px;border:0;border-radius:14px;background:#ff8ec7;color:#fff;font-weight:700;cursor:pointer}.reward{text-align:center;font-size:52px;height:60px}.mascot{text-align:center;font-size:72px}</style></head><body><div class='app' id='app'><h1>🌈 Bé Học Chữ Cái</h1><div class='mascot'>🐰</div><div style='text-align:center'><button class='btn' onclick='start()'>Bắt đầu</button></div><video id='video' autoplay playsinline muted></video><div class='q' id='q'>Nhấn bắt đầu để chơi</div><div class='grid'><div class='ans left' id='left'>A</div><div class='ans right' id='right'>B</div></div><div class='reward' id='reward'></div></div><script src='https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js'></script><script src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js'></script><script>const quiz=[{ask:'Chữ nào là A?',a:'A',b:'B',c:'left'},{ask:'Chữ nào là B?',a:'D',b:'B',c:'right'},{ask:'Chữ nào là C?',a:'C',b:'G',c:'left'},{ask:'Chữ nào là M?',a:'N',b:'M',c:'right'},{ask:'Chữ nào là O?',a:'Q',b:'O',c:'right'}];let i=0,lock=false,last=0;function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=.9;speechSynthesis.speak(u)}function fire(){for(let n=0;n<14;n++){let s=document.createElement('div');s.innerHTML='✨';s.style.position='fixed';s.style.left=Math.random()*100+'vw';s.style.top='20vh';s.style.fontSize='30px';s.style.transition='1s';document.body.appendChild(s);setTimeout(()=>{s.style.top='80vh';s.style.opacity='0';},50);setTimeout(()=>s.remove(),1100);}}function shake(){document.body.style.transform='translateX(8px)';setTimeout(()=>document.body.style.transform='translateX(-8px)',60);setTimeout(()=>document.body.style.transform='translateX(0)',120);if(navigator.vibrate)navigator.vibrate(200)}function load(){if(i>=quiz.length){app.innerHTML='<h1>🏆 Bé học giỏi quá!</h1><div class="mascot">🎁⭐🏅</div><div style="text-align:center"><button class="btn" onclick="location.reload()">Chơi lại</button></div>';speak('Bé học giỏi quá');return;}let x=quiz[i];left.innerHTML=x.a;right.innerHTML=x.b;q.innerHTML='Nghe và xoay đầu chọn chữ';setTimeout(()=>speak(x.ask),300)}function choose(side){if(lock)return;lock=true;let ok=side===quiz[i].c;if(ok){reward.innerHTML='⭐';fire();speak('Đúng rồi giỏi lắm')}else{reward.innerHTML='💪';shake();speak('Thử lại nào')}setTimeout(()=>{reward.innerHTML='';left.className='ans left';right.className='ans right';i++;lock=false;load()},1100)}async function start(){load();try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});video.srcObject=stream;const faceMesh=new FaceMesh({locateFile:(f)=>'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f});faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false});faceMesh.onResults(r=>{if(!r.multiFaceLandmarks||!r.multiFaceLandmarks[0])return;const lm=r.multiFaceLandmarks[0],nose=lm[1].x,center=(lm[33].x+lm[263].x)/2,d=nose-center,now=Date.now();if(now-last<1500)return;if(d<-0.03){left.classList.add('on');right.classList.remove('on');last=now;choose('left')}else if(d>0.03){right.classList.add('on');left.classList.remove('on');last=now;choose('right')}});const cam=new Camera(video,{onFrame:async()=>{await faceMesh.send({image:video})},width:640,height:480});cam.start()}catch(e){q.innerHTML='⚠️ Không mở được camera';}}</script></body></html>
