<!DOCTYPE html><html lang='vi'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Camera Xoay Đầu Full Combo</title><style>body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffe6f2,#e6fbff);display:grid;place-items:center;padding:12px}.app{max-width:860px;width:100%;background:#fff;border-radius:28px;padding:18px;box-shadow:0 12px 32px rgba(0,0,0,.12)}video{width:100%;max-height:320px;object-fit:cover;border-radius:18px;background:#000}.mascot{text-align:center;font-size:70px;animation:b 1s infinite alternate}@keyframes b{from{transform:translateY(0)}to{transform:translateY(-8px)}}.q{text-align:center;font-size:28px;margin:10px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ans{padding:18px;border-radius:20px;background:#f3f3f3;text-align:center;font-size:48px;font-weight:700}.left.on{background:#cde7ff}.right.on{background:#ffd2ea}.reward{text-align:center;font-size:46px}.btn{padding:10px 14px;border:0;border-radius:14px;font-weight:700;cursor:pointer}</style></head><body><div class='app'><h1>🌈 Bé Học Vui Bằng Camera</h1><div class='mascot'>🐰</div><div style='text-align:center'><button class='btn' onclick='start()'>Bắt đầu</button></div><video id='video' autoplay playsinline muted></video><div class='q' id='q'>Nhấn bắt đầu để chơi</div><div class='grid'><div class='ans left' id='left'>A</div><div class='ans right' id='right'>B</div></div><div class='reward' id='reward'></div></div><script src='https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js'></script><script src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js'></script><script>const quiz=[{ask:'Chữ nào là A?',a:'A',b:'B',c:'left'},{ask:'Số nào là 5?',a:'5',b:'2',c:'left'},{ask:'Con nào là chó?',a:'🐱',b:'🐶',c:'right'},{ask:'Màu xanh là ô nào?',a:'🟥',b:'🟦',c:'right'}];let i=0,lock=false,last=0;function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='vi-VN';u.rate=.9;speechSynthesis.speak(u)}function load(){if(i>=quiz.length){q.innerHTML='🏆 Bé thắng rồi!';reward.innerHTML='🎁⭐🏅';speak('Bé thắng rồi');return;}let x=quiz[i];left.innerHTML=x.a;right.innerHTML=x.b;q.innerHTML='Nghe và xoay đầu chọn đáp án';setTimeout(()=>speak(x.ask),300)}function choose(side){if(lock)return;lock=true;let ok=side===quiz[i].c;reward.innerHTML=ok?'⭐':'💪';speak(ok?'Đúng rồi':'Cố lên');setTimeout(()=>{reward.innerHTML='';left.className='ans left';right.className='ans right';i++;lock=false;load()},1000)}async function start(){load();try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});video.srcObject=stream;const faceMesh=new FaceMesh({locateFile:(f)=>'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f});faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false});faceMesh.onResults(r=>{if(!r.multiFaceLandmarks||!r.multiFaceLandmarks[0])return;const lm=r.multiFaceLandmarks[0],nose=lm[1].x,center=(lm[33].x+lm[263].x)/2,d=nose-center,now=Date.now();if(now-last<1500)return;if(d<-0.03){left.classList.add('on');right.classList.remove('on');last=now;choose('left')}else if(d>0.03){right.classList.add('on');left.classList.remove('on');last=now;choose('right')}});const cam=new Camera(video,{onFrame:async()=>{await faceMesh.send({image:video})},width:640,height:480});cam.start()}catch(e){q.innerHTML='⚠️ Không mở được camera';}}</script></body></html>
